<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novexa AI - Professional Assistant Platform</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">
</head>
<body>

  <div id="toast-container" class="toast-container"></div>

  <div id="app-global-loader" class="global-loader hidden">
    <div class="spinner"></div>
    <p>Connecting to secure infrastructure...</p>
  </div>

  <div id="auth-screen" class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Novexa AI</h1>
        <p id="auth-subtitle">Sign in to your professional workspace</p>
      </div>
      
      <form id="auth-form">
        <div class="input-group">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" required placeholder="name@company.com">
        </div>
        
        <div class="input-group" id="pass-field-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" required placeholder="••••••••">
        </div>

        <div class="input-group hidden" id="confirm-pass-field-group">
          <label for="auth-confirm-password">Confirm Password</label>
          <input type="password" id="auth-confirm-password" placeholder="••••••••">
        </div>

        <button type="submit" id="auth-submit-btn" class="btn btn-primary">Sign In</button>
      </form>

      <div class="auth-actions">
        <button id="auth-toggle-mode-btn" class="btn-link">Create Account</button>
        <button id="auth-forgot-btn" class="btn-link">Forgot Password</button>
      </div>

      <div class="divider"><span>or</span></div>

      <button id="auth-guest-btn" class="btn btn-secondary">Continue as Guest</button>
    </div>
  </div>

  <div id="app-screen" class="app-layout hidden">
    
    <aside class="app-sidebar" id="app-sidebar">
      <div class="sidebar-top">
        <button id="new-chat-btn" class="btn btn-primary-outline w-full">+ New Chat</button>
      </div>
      
      <div class="sidebar-history" id="chat-history-container"></div>

      <div class="sidebar-utilities">
        <h4>Workspace Tools</h4>
        <button class="tool-chip" data-tool="writing">Writing Assistant</button>
        <button class="tool-chip" data-tool="code">Code Assistant</button>
        <button class="tool-chip" data-tool="translate">Translation Tool</button>
        <button class="tool-chip" data-tool="resume">Resume Builder</button>
        <button class="tool-chip" data-tool="business">Business Tools</button>
      </div>
      
      <div class="sidebar-footer">
        <div class="user-profile-widget">
          <span class="user-avatar" id="profile-avatar">G</span>
          <div class="user-meta">
            <span id="profile-name" class="profile-name">Guest Mode</span>
            <button id="logout-action-btn" class="btn-link text-xs">Exit Workspace</button>
          </div>
        </div>
        <div class="sys-settings-row">
          <button id="theme-toggle-btn" class="btn-icon" title="Toggle Appearance">🌓</button>
          <button id="pwa-install-btn" class="btn-icon hidden" title="Install Workspace App">📥</button>
        </div>
      </div>
    </aside>

    <main class="main-workspace">
      <header class="workspace-header">
        <button id="sidebar-toggle-mobile" class="btn-icon mobile-only">☰</button>
        <div class="header-title-stack">
          <h2>Central Engine Core</h2>
          <span id="workspace-status" class="status-badge">Secure Local State</span>
        </div>
      </header>

      <section class="messages-viewport" id="chat-viewport">
        <div class="empty-state-card" id="empty-state">
          <h3>Welcome to Novexa AI Engine</h3>
          <p>Deploy specialized commands using the side toolsets or start an open session below.</p>
        </div>
      </section>

      <div id="attachment-preview-bar" class="attachment-preview-bar hidden">
        <span id="attachment-name">document.pdf</span>
        <button id="attachment-clear-btn" class="btn-icon-xs">×</button>
      </div>

      <footer class="input-panel-container">
        <div class="input-toolbar-wrapper">
          <div class="input-row">
            <textarea id="chat-textarea" placeholder="Send an instruction, upload system logs or document assets..." rows="1"></textarea>
            
            <div class="input-actions-cluster">
              <label class="btn-icon" title="Upload Document File" for="file-upload-pdf">
                📄
                <input type="file" id="file-upload-pdf" accept=".pdf" class="hidden-input">
              </label>
              
              <label class="btn-icon" title="Upload Visual Asset" for="file-upload-img">
                📷
                <input type="file" id="file-upload-img" accept="image/*" class="hidden-input">
              </label>

              <button id="voice-input-btn" class="btn-icon" title="Activate Audio Context capture">🎤</button>
              <button id="message-send-btn" class="btn-send" title="Transmit Sequence">➔</button>
            </div>
          </div>
        </div>
      </footer>
    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  
  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
</body>
            </html>
